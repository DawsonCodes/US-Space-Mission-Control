name: Validate

# Plain-Node validation for this zero-build, dependency-free project.
# No package manager, no npm install, no package.json — just Node running the
# repository's own audit and test scripts.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax-check every JavaScript module
        run: |
          set -e
          for f in js/*.js tests/*.mjs; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: Project audit (imports, relative paths, no build artifacts)
        run: node tests/check-project.mjs

      - name: Classification tests (incl. ULA + Firefly, orbit, launch site)
        run: node tests/classification.test.mjs

      - name: Merge / deduplication tests
        run: node tests/merge.test.mjs

      - name: Calendar (.ics) tests
        run: node tests/calendar.test.mjs

      - name: Deep-link tests
        run: node tests/deeplink.test.mjs

      - name: Cache freshness + schema tests
        run: node tests/cache.test.mjs

      - name: Cache-first flow integration
        run: node tests/cache-flow.test.mjs

      - name: Status-banner lifecycle tests
        run: node tests/status.test.mjs

      - name: Organization-color theme tests
        run: node tests/org-colors.test.mjs

      - name: Search-hint (typewriter) lifecycle tests
        run: node tests/search-hint.test.mjs

      - name: API resilience (partial-failure) tests
        run: node tests/api-resilience.test.mjs

      - name: API no-cache retry flow
        run: node tests/api-flow.test.mjs

      - name: Stale-cache fallback flow
        run: node tests/stale-cache.test.mjs

      - name: Duplicate-refresh prevention
        run: node tests/dup-refresh.test.mjs

      - name: Responsive-safety audit
        run: node tests/responsive-audit.test.mjs

      - name: Headless UI / render harness
        run: node tests/headless.test.mjs
